# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: WLED Matrix Manager
version: "1.2.0"
slug: wled_matrix_manager
description: Create and manage pixel-art scenes for WLED LED matrices
url: "https://github.com/home-assistant/addons-example/tree/main/example"
arch:
  - aarch64
  - amd64
init: false
apparmor: false
ingress: true
ingress_port: 8000
ingress_entry_point: /
panel_icon: mdi:led-strip-variant
panel_title: WLED Matrix Manager
homeassistant_api: true
ports:
  8000/tcp: 8000
map:
  - share:rw
  - addon_config:rw
options:
  log_level: info
schema:
  log_level: "list(debug|info|warning|error)?"
